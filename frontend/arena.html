<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatcha Arena - Combat PvP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        header h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        header p { color: #888; font-size: 1.2em; }

        .arena {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 30px;
            margin-top: 30px;
        }
        .fighter-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .fighter-panel.player1 { border-color: rgba(52, 152, 219, 0.5); }
        .fighter-panel.player2 { border-color: rgba(231, 76, 60, 0.5); }
        .fighter-panel h2 { text-align: center; margin-bottom: 20px; font-size: 1.5em; }
        .player1 h2 { color: #3498db; }
        .player2 h2 { color: #e74c3c; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9em; }
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1em;
        }
        .form-group select:focus { outline: none; background: rgba(255,255,255,0.15); }

        .vs-section { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .vs-text {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .fight-btn {
            margin-top: 30px;
            padding: 20px 60px;
            font-size: 1.5em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            color: #fff;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .fight-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4); }
        .fight-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid rgba(243, 156, 18, 0.3);
        }
        .result-header { text-align: center; margin-bottom: 30px; }
        .winner-announcement { font-size: 2.5em; font-weight: bold; color: #f39c12; margin-bottom: 10px; }
        .combat-info { color: #888; }
        .fighters-result { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .fighter-result { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 20px; text-align: center; }
        .fighter-result.winner { border: 2px solid #2ecc71; }
        .fighter-result.loser { border: 2px solid #e74c3c; opacity: 0.7; }
        .fighter-result .element { font-size: 3em; margin-bottom: 10px; }
        .fighter-result .name { font-size: 1.3em; font-weight: bold; margin-bottom: 10px; }
        .fighter-result .hp-change { color: #888; }
        .turn-logs { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 20px; max-height: 300px; overflow-y: auto; }
        .turn-logs h3 { margin-bottom: 15px; color: #f39c12; }
        .log-entry { padding: 10px; margin-bottom: 5px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.9em; }
        .log-entry .turn-num { color: #f39c12; font-weight: bold; margin-right: 10px; }
        .close-btn { display: block; margin: 20px auto 0; padding: 15px 40px; font-size: 1.1em; border: none; border-radius: 30px; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; }
        .close-btn:hover { background: rgba(255,255,255,0.2); }

        .error-message {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .player-selector { margin-bottom: 20px; }
        .player-selector h4 { color: #f39c12; margin-bottom: 10px; }
        .monster-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .monster-card:hover { border-color: #f39c12; }
        .monster-card.selected { border-color: #2ecc71; background: rgba(46, 204, 113, 0.1); }
        .monster-card .element { font-size: 1.5em; }
        .monster-card .stats { color: #aaa; font-size: 0.85em; margin-top: 5px; }

        .loading { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GATCHA ARENA</h1>
            <p>Combat PvP entre 2 joueurs</p>
            <a href="index.html" style="color: #888; font-size: 0.9em; text-decoration: none; margin-top: 10px; display: inline-block;">
                ← Retour au jeu principal
            </a>
        </header>

        <div id="error-container"></div>

        <div class="arena">
            <!-- Joueur 1 -->
            <div class="fighter-panel player1">
                <h2>JOUEUR 1</h2>
                <div class="player-selector">
                    <div class="form-group">
                        <label>Selectionner un joueur</label>
                        <select id="p1-player-select" onchange="loadPlayerMonsters(1)">
                            <option value="">-- Choisir un joueur --</option>
                        </select>
                    </div>
                    <div id="p1-monsters-list"></div>
                </div>
            </div>

            <!-- VS Section -->
            <div class="vs-section">
                <div class="vs-text">VS</div>
                <button class="fight-btn" id="fight-btn" onclick="startCombat()">COMBAT!</button>
            </div>

            <!-- Joueur 2 -->
            <div class="fighter-panel player2">
                <h2>JOUEUR 2</h2>
                <div class="player-selector">
                    <div class="form-group">
                        <label>Selectionner un joueur</label>
                        <select id="p2-player-select" onchange="loadPlayerMonsters(2)">
                            <option value="">-- Choisir un joueur --</option>
                        </select>
                    </div>
                    <div id="p2-monsters-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <div class="result-header">
                <div class="winner-announcement" id="winner-text"></div>
                <div class="combat-info" id="combat-info"></div>
            </div>
            <div class="fighters-result" id="fighters-result"></div>
            <div class="turn-logs">
                <h3>Deroulement du combat</h3>
                <div id="logs-container"></div>
            </div>
            <button class="close-btn" onclick="closeModal()">Fermer</button>
        </div>
    </div>

    <script>
        const API = {
            combat: 'http://localhost:8085/api/combat',
            player: 'http://localhost:8082/api/player',
            monster: 'http://localhost:8083/api/monsters'
        };

        let selectedMonsters = { 1: null, 2: null };
        let playersMonsters = { 1: [], 2: [] };

        document.addEventListener('DOMContentLoaded', loadPlayers);

        async function loadPlayers() {
            try {
                const response = await fetch(`${API.player}/public/list`);
                if (response.ok) {
                    const players = await response.json();
                    const options = players.map(p => `<option value="${p.username}">${p.username} (Niv.${p.level})</option>`).join('');
                    document.getElementById('p1-player-select').innerHTML = '<option value="">-- Choisir un joueur --</option>' + options;
                    document.getElementById('p2-player-select').innerHTML = '<option value="">-- Choisir un joueur --</option>' + options;
                }
            } catch (error) {
                showError('Impossible de charger les joueurs');
            }
        }

        async function loadPlayerMonsters(playerNum) {
            const username = document.getElementById(`p${playerNum}-player-select`).value;
            const container = document.getElementById(`p${playerNum}-monsters-list`);

            if (!username) {
                container.innerHTML = '';
                playersMonsters[playerNum] = [];
                selectedMonsters[playerNum] = null;
                return;
            }

            container.innerHTML = '<div class="loading">Chargement...</div>';

            try {
                const response = await fetch(`${API.monster}/public/player/${username}`);
                if (response.ok) {
                    const monsters = await response.json();
                    playersMonsters[playerNum] = monsters;

                    if (monsters.length === 0) {
                        container.innerHTML = '<p style="color: #888; text-align: center; padding: 20px;">Aucun monstre</p>';
                        return;
                    }

                    container.innerHTML = monsters.map((m, i) => `
                        <div class="monster-card" id="p${playerNum}-monster-${i}" onclick="selectMonster(${playerNum}, ${i})">
                            <span class="element">${getElementEmoji(m.element)}</span>
                            <strong>Monstre #${m.baseId}</strong> - Niv.${m.level}
                            <div class="stats">HP: ${m.hp} | ATK: ${m.atk} | DEF: ${m.def} | VIT: ${m.vit}</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                container.innerHTML = '<p style="color: #e74c3c; text-align: center;">Erreur de chargement</p>';
            }
        }

        function selectMonster(playerNum, index) {
            document.querySelectorAll(`#p${playerNum}-monsters-list .monster-card`).forEach(card => card.classList.remove('selected'));
            document.getElementById(`p${playerNum}-monster-${index}`).classList.add('selected');
            selectedMonsters[playerNum] = playersMonsters[playerNum][index];
        }

        function showError(message) {
            document.getElementById('error-container').innerHTML = `<div class="error-message">${message}</div>`;
            setTimeout(() => { document.getElementById('error-container').innerHTML = ''; }, 5000);
        }

        async function startCombat() {
            if (!selectedMonsters[1] || !selectedMonsters[2]) {
                showError('Selectionnez un monstre pour chaque joueur!');
                return;
            }

            const btn = document.getElementById('fight-btn');
            btn.disabled = true;
            btn.textContent = 'Combat en cours...';

            try {
                const monster1 = formatMonster(selectedMonsters[1]);
                const monster2 = formatMonster(selectedMonsters[2]);

                if (monster1.playerName === monster2.playerName) {
                    showError('Les deux joueurs doivent etre differents!');
                    return;
                }

                const response = await fetch(`${API.combat}/fight`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ monster1, monster2 })
                });

                if (response.ok) {
                    const result = await response.json();
                    showResult(result);
                } else {
                    const error = await response.json();
                    showError(error.message || 'Erreur lors du combat');
                }
            } catch (error) {
                showError('Erreur de connexion: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'COMBAT!';
            }
        }

        function formatMonster(monster) {
            return {
                playerName: monster.ownerUsername,
                element: monster.element,
                hp: monster.hp,
                atk: monster.atk,
                def: monster.def,
                vit: monster.vit,
                skills: monster.skills.map(s => ({
                    num: s.num,
                    dmg: s.dmg,
                    ratioStat: s.ratio.stat,
                    ratioPercent: s.ratio.percent,
                    cooldown: s.cooldown
                }))
            };
        }

        function getElementEmoji(element) {
            return { fire: '🔥', water: '💧', wind: '🌪️' }[element] || '⭐';
        }

        function showResult(result) {
            const f1Won = result.fighter1.winner;
            document.getElementById('winner-text').innerHTML =
                `${getElementEmoji(f1Won ? result.fighter1.element : result.fighter2.element)} ${result.winnerName} remporte le combat!`;
            document.getElementById('combat-info').textContent = `Combat #${result.combatNumber} - ${result.totalTurns} tours`;
            document.getElementById('fighters-result').innerHTML = `
                <div class="fighter-result ${f1Won ? 'winner' : 'loser'}">
                    <div class="element">${getElementEmoji(result.fighter1.element)}</div>
                    <div class="name">${result.fighter1.playerName}</div>
                    <div class="hp-change">HP: ${result.fighter1.hpStart} → ${result.fighter1.hpEnd}</div>
                    <div>${f1Won ? '🏆 VAINQUEUR' : '💀 VAINCU'}</div>
                </div>
                <div class="fighter-result ${!f1Won ? 'winner' : 'loser'}">
                    <div class="element">${getElementEmoji(result.fighter2.element)}</div>
                    <div class="name">${result.fighter2.playerName}</div>
                    <div class="hp-change">HP: ${result.fighter2.hpStart} → ${result.fighter2.hpEnd}</div>
                    <div>${!f1Won ? '🏆 VAINQUEUR' : '💀 VAINCU'}</div>
                </div>
            `;
            document.getElementById('logs-container').innerHTML = result.turnLogs.map(log =>
                `<div class="log-entry"><span class="turn-num">T${log.turn}</span>${log.description}</div>`
            ).join('');
            document.getElementById('result-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('result-modal').classList.remove('active');
        }

        document.getElementById('result-modal').addEventListener('click', (e) => {
            if (e.target.id === 'result-modal') closeModal();
        });
    </script>
</body>
</html>
